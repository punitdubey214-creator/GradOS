<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GradOS Settings</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar">

<div class="logo">
GradOS
</div>

<div class="nav-buttons">

<a href="dashboard.html" class="btn-secondary">
Dashboard
</a>

</div>

</nav>

<div class="page-container">

<div class="page-header">

<div>

<h1>Settings</h1>

<p>
Manage your GradOS profile and preferences.
</p>

</div>

</div>

<div class="settings-card">

<label>Name</label>

<input
type="text"
id="settingsName"
placeholder="Your Name">

<label>Email</label>

<input
type="email"
id="settingsEmail"
placeholder="Your Email">

<button
id="saveSettingsBtn"
class="btn-primary">

Save Changes

</button>

</div>

</div>

<script>

const nameInput =
document.getElementById(
"settingsName"
);

const emailInput =
document.getElementById(
"settingsEmail"
);

nameInput.value =
localStorage.getItem(
"userName"
) || "";

emailInput.value =
localStorage.getItem(
"userEmail"
) || "";

document
.getElementById(
"saveSettingsBtn"
)
.addEventListener(
"click",
()=>{

localStorage.setItem(
"userName",
nameInput.value
);

localStorage.setItem(
"userEmail",
emailInput.value
);

alert(
"Settings Saved Successfully!"
);

});

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GradOS Settings</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-93NNV4VVHM"></script>

<script>
window.dataLayer = window.dataLayer || [];

function gtag(){
dataLayer.push(arguments);
}

gtag('js', new Date());

gtag('config', 'G-93NNV4VVHM');
console.log("Analytics Loaded");
</script>
</head>

<body>

<nav class="navbar">

<div class="logo">
GradOS
</div>

<div class="nav-buttons">

<a href="dashboard.html" class="btn-secondary">
Dashboard
</a>

</div>

</nav>

<div class="page-container">

<div class="page-header">

<div>

<h1>Settings</h1>

<p>
Manage your GradOS profile and preferences.
</p>

</div>

</div>

<div class="settings-card">

<label>Name</label>

<input
type="text"
id="settingsName"
placeholder="Your Name">

<label>Email</label>

<input
type="email"
id="settingsEmail"
placeholder="Your Email">

<button
id="saveSettingsBtn"
class="btn-primary">

Save Changes

</button>

<button
id="exportBtn"
class="btn-secondary">

Export Backup

</button>

<input
type="file"
id="importFile"
accept=".json"
style="display:none;">

<button
id="importBtn"
class="btn-secondary">

Import Backup

</button>

</div>

</div>

<script>

/* =====================
   LOAD SETTINGS
===================== */

const nameInput =
document.getElementById("settingsName");

const emailInput =
document.getElementById("settingsEmail");

nameInput.value =
localStorage.getItem("userName") || "";

emailInput.value =
localStorage.getItem("userEmail") || "";

/* =====================
   SAVE SETTINGS
===================== */

document
.getElementById("saveSettingsBtn")
.addEventListener("click", () => {

localStorage.setItem(
"userName",
nameInput.value
);

localStorage.setItem(
"userEmail",
emailInput.value
);

alert("Settings Saved Successfully!");

});

/* =====================
   EXPORT BACKUP
===================== */

document
.getElementById("exportBtn")
.addEventListener("click", () => {

const backup = {

userName:
localStorage.getItem("userName"),

userEmail:
localStorage.getItem("userEmail"),

applications:
JSON.parse(
localStorage.getItem("applications")
) || [],

professors:
JSON.parse(
localStorage.getItem("professors")
) || [],

referees:
JSON.parse(
localStorage.getItem("referees")
) || [],

notes:
JSON.parse(
localStorage.getItem("notes")
) || []

};

const data =
JSON.stringify(
backup,
null,
2
);

const blob =
new Blob(
[data],
{
type:"application/json"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"grados_backup.json";

a.click();

URL.revokeObjectURL(url);

});

/* =====================
   IMPORT BACKUP
===================== */

document
.getElementById("importBtn")
.addEventListener("click", () => {

document
.getElementById("importFile")
.click();

});

document
.getElementById("importFile")
.addEventListener("change", (event) => {

const file =
event.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(e){

try{

const backup =
JSON.parse(
e.target.result
);

if(backup.userName){

localStorage.setItem(
"userName",
backup.userName
);

}

if(backup.userEmail){

localStorage.setItem(
"userEmail",
backup.userEmail
);

}

if(backup.applications){

localStorage.setItem(
"applications",
JSON.stringify(
backup.applications
)
);

}

if(backup.professors){

localStorage.setItem(
"professors",
JSON.stringify(
backup.professors
)
);

}

if(backup.referees){

localStorage.setItem(
"referees",
JSON.stringify(
backup.referees
)
);

}

if(backup.notes){

localStorage.setItem(
"notes",
JSON.stringify(
backup.notes
)
);

}

alert(
"Backup Imported Successfully!"
);

location.reload();

}

catch(error){

alert(
"Invalid Backup File!"
);

}

};

reader.readAsText(file);

});

</script>

</body>

</html>
